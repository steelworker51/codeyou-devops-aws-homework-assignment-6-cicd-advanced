name: Develop CI/CD

on:
  push:
    branches: [develop]

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - run: bundle exec rubocop
      - run: gem install bundler-audit && bundler-audit update && bundler-audit check
      - run: bundle exec rspec

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t charlie1979/ruby-app:develop -t charlie1979/ruby-app:${GITHUB_SHA::7} .

      - run: docker push charlie1979/ruby-app:develop

      - run: docker push charlie1979/ruby-app:${GITHUB_SHA::7}

      
      
